services:
  db:
    image: mysql:8.0
    container_name: moyelog-db
    restart: always
    environment:
      MYSQL_DATABASE: moyeolog
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      # MySQL 데이터를 안전하게 보관하는 볼륨
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  app:
    build: .
    container_name: moyelog-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/moyeolog?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=rootpassword
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    restart: always
    volumes:
      # 앱에서 업로드한 이미지 파일을 안전하게 보관하는 볼륨
      # 주의: '/app/uploads' 부분을 실제 Spring Boot 코드가 이미지를 저장하는 경로로 반드시 수정해야 합니다.
      - app_images:/app/uploads

  nginx:
    image: nginx:1.25-alpine
    container_name: moyelog-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    depends_on:
      - app
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: moyelog-certbot
    restart: always
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

# 최하단에 도커 볼륨 선언
volumes:
  db_data:
  app_images: